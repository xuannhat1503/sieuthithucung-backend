spring.application.name=sieuthithucung

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/sieuthithucung?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}

app.cors.allowed-origin=${APP_CORS_ALLOWED_ORIGIN:http://localhost:3000}
app.admin.seed.enabled=${APP_ADMIN_SEED_ENABLED:false}
app.admin.seed.email=${APP_ADMIN_SEED_EMAIL:}
app.admin.seed.password=${APP_ADMIN_SEED_PASSWORD:}
app.admin.seed.name=${APP_ADMIN_SEED_NAME:STTC Admin}
app.upload.dir=${APP_UPLOAD_DIR:uploads}

spring.servlet.multipart.max-file-size=${MULTIPART_MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MULTIPART_MAX_REQUEST_SIZE:10MB}

