[phases.setup]
nixPkgs = ["jdk21", "maven"]

[phases.build]
cmds = ["mvn -DskipTests clean package"]

[start]
cmd = "sh -c 'JAR=$(ls target/*.jar | grep -v \"\\.original\" | head -n 1); if [ -z \"$JAR\" ]; then echo \"No runnable jar found in target/\"; exit 1; fi; java -Dserver.port=${PORT:-8080} -jar \"$JAR\"'"
